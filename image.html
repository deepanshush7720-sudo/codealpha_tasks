<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
<link rel="shortcut icon" href="logo.png" title="image">
</head>
<body>

<h1>Image Gallery</h1>

<div class="filter-buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="N1.jpg" alt="">
    </div>

    <div class="image city">
        <img src="1.jpg" alt="">
    </div>

    <div class="image nature">
        <img src="N2.jpg" alt="">
    </div>

    <div class="image city">
        <img src="2.jpg" alt="">
    </div>

    <div class="image nature">
        <img src="N3.jpg" alt="">
    </div>

    <div class="image city">
        <img src="3.jpg" alt="">
    </div>

     <div class="image nature">
        <img src="N4.jpg" alt="">
    </div>

    <div class="image city">
        <img src="4.jpg" alt="">
    </div>

</div>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

    <span class="close">&times;</span>

    <button class="prev">&#10094;</button>

    <img id="lightbox-img">

    <button class="next">&#10095;</button>

</div>

<script src="script.js"></script>
<br><br>
<footer>
    <p>© 2026 Deepanshu Sharma | All Rights Reserved</p>
</footer>

</body>
</html>
